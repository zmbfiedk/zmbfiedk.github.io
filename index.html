<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XMB Portfolio</title>
    <link rel="stylesheet" href="xmb-portfolio.css">
</head>
<body>
    <!-- Wave background -->
    <div class="wave-container">
        <div class="wave"></div>
        <div class="wave"></div>
        <div class="wave"></div>
        <div class="wave"></div>
        <div class="wave"></div>
    </div>

    <!-- Header -->
    <div class="header">
        <h1 id="headerName">Arthur Henriques Garcia</h1>
    </div>

    <!-- Language switcher -->
    <div class="language-switcher">
        <button class="lang-btn active" onclick="changeLanguage('en')" data-lang="en">EN</button>
        <button class="lang-btn" onclick="changeLanguage('pt')" data-lang="pt">PT</button>
        <button class="lang-btn" onclick="changeLanguage('nl')" data-lang="nl">NL</button>
    </div>

    <!-- Main XMB Interface -->
    <div class="xmb-container" id="xmbContainer">
        <div class="categories-wrapper" id="categoriesWrapper">
            <!-- Categories will be generated here -->
        </div>

        <!-- Detail panel -->
        <div class="detail-panel" id="detailPanel">
            <div class="detail-content">
                <p class="detail-text" id="detailText"></p>
            </div>
        </div>

        <!-- Navigation hint -->
        <div class="nav-hint">
            <span class="desktop-hint" id="navHintDesktop">Use arrow keys or click to navigate • Press Enter for details</span>
            <span class="mobile-hint" id="navHintMobile">Swipe or tap to navigate • Tap twice for details</span>
        </div>
    </div>

    <!-- Detail Page -->
    <div class="detail-page" id="detailPage">
        <button class="back-button" onclick="closeDetailPage()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
            <span id="backButtonText">Back to Menu</span>
        </button>
        <div class="detail-page-content">
            <div class="detail-card">
                <div class="detail-header-row">
                    <h1 id="detailPageTitle"></h1>
                    <a id="detailGithubLink" class="github-icon-link" href="#" target="_blank" rel="noopener noreferrer" aria-label="Open project GitHub repository">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M12 2C6.48 2 2 6.58 2 12.22c0 4.5 2.87 8.32 6.84 9.67.5.1.66-.22.66-.49v-1.72c-2.78.62-3.37-1.36-3.37-1.36-.46-1.18-1.11-1.5-1.11-1.5-.9-.64.07-.63.07-.63 1 .08 1.53 1.04 1.53 1.04.88 1.55 2.3 1.1 2.86.84.09-.66.34-1.1.62-1.36-2.22-.26-4.56-1.14-4.56-5.05 0-1.11.39-2.01 1.03-2.72-.1-.26-.45-1.3.1-2.7 0 0 .84-.28 2.75 1.04A9.33 9.33 0 0 1 12 7.6c.85 0 1.7.12 2.5.36 1.9-1.32 2.74-1.04 2.74-1.04.55 1.4.2 2.44.1 2.7.64.71 1.03 1.61 1.03 2.72 0 3.92-2.34 4.78-4.57 5.04.36.32.68.95.68 1.92v2.84c0 .27.16.59.67.49A10.25 10.25 0 0 0 22 12.22C22 6.58 17.52 2 12 2z"/>
                        </svg>
                    </a>
                </div>
                <p class="subtitle" id="detailPageSubtitle"></p>
                <div class="content" id="detailPageContent"></div>
            </div>
        </div>
    </div>

    <script src="xmb-portfolio.js"></script>
</body>
</html>
